name: Deploy to GitHub Pages

# Publishes the static app in public/ to GitHub Pages, giving a live URL.
on:
  push:
    branches:
      - main
      - claude/quirky-albattani-KwBZp
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run seed # ensure bundled seed roster + default config exist
      - run: npm run build:cards # auto-register any card PNGs in public/assets/cards/
      - name: Commit refreshed manifest back to the repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if ! git diff --quiet -- public/data/cards.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/data/cards.json
            git commit -m "chore: auto-refresh cards.json from uploaded card art [skip ci]"
            git push origin HEAD:main
          else
            echo "cards.json already in sync."
          fi
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
